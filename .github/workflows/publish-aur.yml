name: Publish AUR package

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-aur:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Install packaging dependencies
        run: pacman -Syu --noconfirm git openssh

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create build user
        run: |
          useradd --create-home --shell /bin/bash builduser
          chown -R builduser:builduser "$GITHUB_WORKSPACE"

      - name: Configure SSH for AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          if [ -z "$AUR_SSH_KEY" ]; then
            printf 'AUR_SSH_KEY secret is not configured; cannot publish to AUR\n' >&2
            exit 1
          fi
          install -d -m 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          cat <<'EOF' > ~/.ssh/config
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Publish PKGBUILD to AUR
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          workdir=$(mktemp -d)
          cp PKGBUILD "$workdir/PKGBUILD"
          chown -R builduser:builduser "$workdir"
          runuser -u builduser -- bash -lc 'cd "$1" && makepkg --nobuild --nodeps && makepkg --printsrcinfo > .SRCINFO' -- "$workdir"
          git clone ssh://aur@aur.archlinux.org/anyrun-qalculate-git.git aur
          install -Dm644 "$workdir/PKGBUILD" aur/PKGBUILD
          install -Dm644 "$workdir/.SRCINFO" aur/.SRCINFO
          cd aur
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            printf 'AUR metadata already up to date\n'
            exit 0
          fi
          git commit -m "Update from ${GITHUB_SHA}"
          git push origin master
