name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Install system dependencies
        run: pacman -Syu --noconfirm git rust pkgconf gcc libqalculate cargo-nextest

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create build user
        run: |
          useradd --create-home --shell /bin/bash builduser
          chown -R builduser:builduser "$GITHUB_WORKSPACE"

      - name: Install cargo-ratchet
        run: runuser -u builduser -- bash -lc 'cd "$GITHUB_WORKSPACE" && cargo install tdd-ratchet --locked'

      - name: Build release plugin
        run: runuser -u builduser -- bash -lc 'cd "$GITHUB_WORKSPACE" && cargo build --release'

      - name: Run ratchet
        run: runuser -u builduser -- bash -lc 'cd "$GITHUB_WORKSPACE" && cargo ratchet'

      - name: Verify AUR package links native dependencies
        run: |
          runuser -u builduser -- bash -lc 'cd "$GITHUB_WORKSPACE" && rm -rf pkg src/anyrun-qalculate anyrun-qalculate && cargo clean && makepkg -f --nodeps --noconfirm && readelf -d pkg/anyrun-qalculate-git/usr/lib/anyrun/libanyrun_qalculate.so | grep "Shared library: \[libqalculate.so.23\]" && readelf -d pkg/anyrun-qalculate-git/usr/lib/anyrun/libanyrun_qalculate.so | grep "Shared library: \[libstdc++.so.6\]"'
