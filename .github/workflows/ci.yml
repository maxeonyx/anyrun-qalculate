name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Install system dependencies
        run: pacman -Syu --noconfirm git rust pkgconf gcc libqalculate cargo-nextest

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Trust checked out workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install cargo-ratchet
        run: cargo install tdd-ratchet --locked

      - name: Build release plugin
        run: cargo build --release

      - name: Run ratchet
        run: cargo ratchet

      - name: Verify AUR package links native dependencies
        run: |
          rm -rf pkg src/anyrun-qalculate anyrun-qalculate
          cargo clean
          makepkg -f --noconfirm
          readelf -d pkg/anyrun-qalculate-git/usr/lib/anyrun/libanyrun_qalculate.so | grep 'Shared library: \[libqalculate.so.23\]'
          readelf -d pkg/anyrun-qalculate-git/usr/lib/anyrun/libanyrun_qalculate.so | grep 'Shared library: \[libstdc++.so.6\]'
